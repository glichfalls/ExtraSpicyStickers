name: Deploy to Plesk

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            PHP="/opt/plesk/php/8.4/bin/php"
            APP_DIR="/var/www/vhosts/srv1.netlabs.dev/sticker-bot.srv1.netlabs.dev"

            # Clone or pull
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin master
              git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Create .env.local with secrets
            cat > .env.local << 'ENVEOF'
            APP_ENV=prod
            APP_DEBUG=0
            APP_SECRET=${{ secrets.APP_SECRET }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            ENVEOF
            sed -i 's/^            //' .env.local

            # Install dependencies
            $PHP /opt/psa/var/modules/composer/composer.phar install --no-dev --optimize-autoloader --no-interaction

            # Run database migrations
            $PHP bin/console doctrine:migrations:migrate --no-interaction

            # Clear and warm up cache
            $PHP bin/console cache:clear --env=prod
            $PHP bin/console cache:warmup --env=prod

            # Set Telegram webhook
            $PHP bin/console telegram:webhook:set https://sticker-bot.srv1.netlabs.dev/webhook/

            # Ensure sticker upload directory exists
            mkdir -p public/stickers
            chmod 775 public/stickers

            # Fix permissions
            chmod -R 775 var/ || true