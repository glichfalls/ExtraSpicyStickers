services:
  app:
    image: ghcr.io/${GITHUB_REPO}:latest
    container_name: sticker-bot-app
    restart: unless-stopped
    volumes:
      - app-data:/var/www/html/var
      - ./.env.local:/var/www/html/.env:ro
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
    depends_on:
      - mysql
    networks:
      - sticker-bot-network

  mysql:
    image: mysql:8.0
    container_name: sticker-bot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sticker_bot}
      MYSQL_USER: ${MYSQL_USER:-sticker_bot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stickerpass}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - sticker-bot-network

  nginx:
    image: nginx:alpine
    container_name: sticker-bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - sticker-bot-network

  certbot:
    image: certbot/certbot
    container_name: sticker-bot-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  sticker-bot-network:
    driver: bridge

volumes:
  app-data:
  certbot-webroot:
  certbot-certs:
  mysql-data:
